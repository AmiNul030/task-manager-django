{% extends "tasks/base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="mb-3">Delete Task</h3>
    <p>Are you sure you want to delete "<strong>{{ task.title }}</strong>"?</p>

    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger">Delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'task_list' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
