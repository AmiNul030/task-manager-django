<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body{
      background: radial-gradient(1200px 800px at 15% 10%, #e8f0ff 0%, transparent 55%),
                  radial-gradient(1000px 700px at 90% 20%, #ffe8f3 0%, transparent 55%),
                  #f6f7fb;
    }
    .app {max-width: 980px;}
    .card{border:0; border-radius:18px;}
    .soft-shadow{box-shadow: 0 12px 40px rgba(16,24,40,.08);}
    .task-item{border:0; border-radius:16px; margin-bottom:10px;}
    .task-item:hover{transform: translateY(-1px); transition:.12s; box-shadow:0 14px 30px rgba(16,24,40,.08);}
    .pill{font-size:12px; padding:6px 10px; border-radius:999px;}
    .muted{color:#6b7280;}
    .title{font-weight:700;}
  </style>
</head>
<body>

  <div class="container py-5 app">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-check2-square fs-4 text-primary"></i>
          <div class="h4 m-0 title">Task Manager</div>
        </div>
        <div class="muted">CRUD practice project (Level 1)</div>
      </div>
      {% block top_action %}{% endblock %}
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success soft-shadow">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

</body>
</html>
