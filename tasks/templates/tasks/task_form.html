{% extends "tasks/base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="mb-4">{{ title }}</h3>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button class="btn btn-primary">Save</button>
      <a class="btn btn-outline-secondary" href="{% url 'task_list' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
