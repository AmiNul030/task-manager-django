{% extends "tasks/base.html" %}

{% block content %}
<div class="card soft-shadow">
  <div class="card-body p-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="h5 m-0 title">{{ title }}</div>
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'task_list' %}">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Title</label>
        {{ form.title }}
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        {{ form.description }}
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Priority</label>
          {{ form.priority }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Due date</label>
          {{ form.due_date }}
        </div>
      </div>

      <div class="form-check mb-4">
        {{ form.completed }}
        <label class="form-check-label">Completed</label>
      </div>

      <button class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
      <a class="btn btn-outline-secondary" href="{% url 'task_list' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
