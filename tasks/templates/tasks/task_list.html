{% extends "tasks/base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="mb-4">My Tasks</h3>

    <div class="list-group">
      {% for task in tasks %}
      <div class="list-group-item d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">

          <!-- POST toggle (Part-1 style, no JS) -->
          <form method="post" action="{% url 'task_toggle' task.pk %}" class="m-0">
            {% csrf_token %}
            <input class="form-check-input" type="checkbox"
                   {% if task.completed %}checked{% endif %}
                   onchange="this.form.submit()">
          </form>

          <div>
            <div class="{% if task.completed %}text-muted text-decoration-line-through{% endif %}">
              {{ task.title }}
            </div>
            {% if task.description %}
              <small class="text-muted">{{ task.description }}</small>
            {% endif %}
          </div>
        </div>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="{% url 'task_edit' task.pk %}">Edit</a>
          <a class="btn btn-outline-danger btn-sm" href="{% url 'task_delete' task.pk %}">Delete</a>
        </div>
      </div>
      {% empty %}
      <div class="list-group-item text-muted">No tasks yet.</div>
      {% endfor %}
    </div>

    <a class="btn btn-primary mt-4" href="{% url 'task_add' %}">+ Add New Task</a>
  </div>
</div>
{% endblock %}
